<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAE AI Studio · 创意指挥室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --lavender:#C3B5EB;
    --orchid:#7350B9;
    --lilac:#F0E6F5;
    --orchid-deep:#4A2F80;
    --ink:#2A1F3D;
    --paper:#FBF9FD;
    --white:#FFFFFF;
    --line:#E4D8ED;
    --muted:#8A7BA3;
    --shadow:0 4px 24px rgba(115,80,185,.10);
    --shadow-lg:0 12px 40px rgba(115,80,185,.16);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter','Noto Sans SC',sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--lavender);color:var(--orchid-deep)}

  /* ---- ambient backdrop ---- */
  .aura{position:fixed;inset:0;z-index:-1;overflow:hidden}
  .aura span{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5}
  .aura .a1{width:480px;height:480px;background:var(--lavender);top:-140px;right:-120px}
  .aura .a2{width:360px;height:360px;background:var(--lilac);bottom:-100px;left:-80px}
  .aura .a3{width:300px;height:300px;background:#E8DEF7;top:40%;left:55%}

  /* ---- shell ---- */
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  /* ---- header ---- */
  header{padding:28px 0 20px;position:sticky;top:0;z-index:50;
    backdrop-filter:blur(14px);background:rgba(251,249,253,.72);
    border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:20px}
  .brand{display:flex;align-items:center;gap:13px}
  .glyph{width:42px;height:42px;border-radius:13px;
    background:linear-gradient(135deg,var(--orchid),var(--lavender));
    display:grid;place-items:center;box-shadow:var(--shadow);flex-shrink:0}
  .glyph svg{width:22px;height:22px}
  .brand h1{font-family:'Fraunces',serif;font-weight:500;font-size:20px;
    letter-spacing:-.01em;line-height:1.1}
  .brand p{font-size:11px;color:var(--muted);letter-spacing:.14em;
    text-transform:uppercase;font-weight:500}
  .status{display:flex;align-items:center;gap:7px;font-size:12px;
    color:var(--muted);padding:6px 13px;border-radius:100px;
    background:var(--white);border:1px solid var(--line)}
  .dot{width:7px;height:7px;border-radius:50%;background:#B8B0C8}
  .dot.live{background:#5BC98A;box-shadow:0 0 0 3px rgba(91,201,138,.2)}

  /* ---- hero ---- */
  .hero{padding:52px 0 30px}
  .eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--orchid);font-weight:600;margin-bottom:16px}
  .hero h2{font-family:'Fraunces',serif;font-weight:400;
    font-size:clamp(34px,5vw,54px);line-height:1.08;letter-spacing:-.02em;
    max-width:16ch}
  .hero h2 em{font-style:italic;color:var(--orchid)}
  .hero .sub{margin-top:20px;font-size:16px;color:var(--muted);max-width:52ch}

  /* ---- tabs ---- */
  nav.tabs{display:flex;gap:6px;margin:34px 0 10px;flex-wrap:wrap;
    padding:5px;background:var(--white);border:1px solid var(--line);
    border-radius:16px;width:fit-content;box-shadow:var(--shadow)}
  nav.tabs button{font-family:inherit;font-size:14px;font-weight:500;
    color:var(--muted);background:none;border:none;cursor:pointer;
    padding:9px 18px;border-radius:11px;transition:.22s;white-space:nowrap}
  nav.tabs button:hover{color:var(--orchid)}
  nav.tabs button.on{background:var(--orchid);color:#fff;
    box-shadow:0 2px 10px rgba(115,80,185,.28)}

  section.view{display:none;padding:22px 0 80px;animation:rise .4s ease}
  section.view.on{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* ---- stat strip ---- */
  .strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:30px}
  .stat{background:var(--white);border:1px solid var(--line);border-radius:16px;
    padding:18px 20px;position:relative;overflow:hidden}
  .stat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
    background:linear-gradient(var(--orchid),var(--lavender))}
  .stat .n{font-family:'Fraunces',serif;font-size:30px;font-weight:500;
    color:var(--orchid-deep);line-height:1}
  .stat .l{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:.02em}

  /* ---- cards ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:18px;
    padding:22px;transition:.25s;position:relative}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--lavender)}
  .card .tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.04em;
    color:var(--orchid);background:var(--lilac);padding:4px 11px;border-radius:100px;
    margin-bottom:13px}
  .card h3{font-family:'Fraunces',serif;font-weight:500;font-size:18px;
    line-height:1.3;margin-bottom:9px}
  .card p{font-size:14px;color:var(--muted);line-height:1.55}
  .card .meta{display:flex;gap:10px;align-items:center;margin-top:15px;
    padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
  .card a.open{color:var(--orchid);text-decoration:none;font-weight:600;
    margin-left:auto;display:inline-flex;align-items:center;gap:4px}
  .card a.open:hover{gap:7px}

  /* hook cards */
  .hook{border-left:3px solid var(--lavender)}
  .hook .quote{font-family:'Fraunces',serif;font-style:italic;font-size:17px;
    line-height:1.4;color:var(--ink);margin-bottom:12px}

  /* bench cards */
  .bench{display:flex;gap:14px;align-items:flex-start}
  .avatar{width:46px;height:46px;border-radius:14px;flex-shrink:0;
    background:linear-gradient(135deg,var(--lavender),var(--lilac));
    display:grid;place-items:center;font-family:'Fraunces',serif;
    font-weight:600;color:var(--orchid-deep);font-size:18px}

  /* ---- AI studio ---- */
  .studio{display:grid;grid-template-columns:340px 1fr;gap:22px;align-items:start}
  @media(max-width:820px){.studio{grid-template-columns:1fr}}
  .panel{background:var(--white);border:1px solid var(--line);border-radius:20px;padding:24px}
  .panel h3{font-family:'Fraunces',serif;font-weight:500;font-size:19px;margin-bottom:6px}
  .panel .hint{font-size:13px;color:var(--muted);margin-bottom:20px}
  .tool{width:100%;text-align:left;font-family:inherit;background:var(--paper);
    border:1px solid var(--line);border-radius:13px;padding:14px 16px;
    cursor:pointer;transition:.2s;margin-bottom:10px;display:flex;
    align-items:center;gap:12px}
  .tool:hover{border-color:var(--orchid);background:var(--lilac)}
  .tool.on{border-color:var(--orchid);background:var(--lilac)}
  .tool .ico{width:34px;height:34px;border-radius:10px;background:var(--white);
    display:grid;place-items:center;flex-shrink:0;border:1px solid var(--line)}
  .tool .tt{font-weight:600;font-size:14px}
  .tool .td{font-size:12px;color:var(--muted)}
  label.fld{display:block;font-size:13px;font-weight:600;margin-bottom:8px}
  textarea,input.txt{width:100%;font-family:inherit;font-size:14px;
    border:1px solid var(--line);border-radius:13px;padding:13px 15px;
    background:var(--paper);resize:vertical;transition:.2s;color:var(--ink)}
  textarea{min-height:110px}
  textarea:focus,input.txt:focus{outline:none;border-color:var(--orchid);
    background:#fff;box-shadow:0 0 0 3px rgba(115,80,185,.1)}
  .run{margin-top:16px;font-family:inherit;font-size:15px;font-weight:600;
    color:#fff;background:linear-gradient(135deg,var(--orchid),var(--orchid-deep));
    border:none;border-radius:13px;padding:13px 26px;cursor:pointer;transition:.2s;
    display:inline-flex;align-items:center;gap:9px}
  .run:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .run:disabled{opacity:.55;cursor:wait;transform:none}
  .out{margin-top:20px;padding:20px;border-radius:15px;background:var(--lilac);
    border:1px solid var(--line);font-size:14.5px;line-height:1.7;
    white-space:pre-wrap;min-height:60px;color:var(--ink)}
  .out:empty::before{content:'结果会出现在这里 ✦';color:var(--muted);font-style:italic}

  /* ---- states ---- */
  .loading,.empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty h3{font-family:'Fraunces',serif;font-size:20px;color:var(--ink);margin-bottom:8px}
  .spinner{width:34px;height:34px;border:3px solid var(--line);
    border-top-color:var(--orchid);border-radius:50%;
    animation:spin .8s linear infinite;margin:0 auto 18px}
  @keyframes spin{to{transform:rotate(360deg)}}

  footer{padding:28px 0;border-top:1px solid var(--line);text-align:center;
    font-size:12px;color:var(--muted)}
  footer em{font-family:'Fraunces',serif;font-style:italic;color:var(--orchid)}

  @media(max-width:720px){
    .strip{grid-template-columns:repeat(2,1fr)}
    .hero{padding:36px 0 20px}
  }
</style>
</head>
<body>
<div class="aura"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div>

<header>
  <div class="wrap bar">
    <div class="brand">
      <div class="glyph">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 3l2.5 5.5L20 11l-5.5 2.5L12 19l-2.5-5.5L4 11l5.5-2.5L12 3z" fill="#fff"/></svg>
      </div>
      <div>
        <h1>MAE AI Studio</h1>
        <p>创意指挥室</p>
      </div>
    </div>
    <div class="status"><span class="dot" id="conn"></span><span id="connTxt">连接中…</span></div>
  </div>
</header>

<main class="wrap">
  <div class="hero">
    <div class="eyebrow">Content Intelligence</div>
    <h2>让每一条内容<br>都<em>被看见</em>。</h2>
    <p class="sub">灵感、钩子、对标账号与 AI 创作工具，汇集在一处。为 25–45 岁的她，找到真正有共鸣的表达。</p>
  </div>

  <nav class="tabs">
    <button class="on" data-v="insp">灵感库</button>
    <button data-v="hooks">钩子库</button>
    <button data-v="bench">对标账号</button>
    <button data-v="ai">AI 工作台</button>
  </nav>

  <!-- 灵感库 -->
  <section class="view on" id="v-insp">
    <div class="strip" id="inspStats"></div>
    <div id="inspBody"><div class="loading"><div class="spinner"></div>正在读取灵感收藏库…</div></div>
  </section>

  <!-- 钩子库 -->
  <section class="view" id="v-hooks">
    <div id="hookBody"><div class="loading"><div class="spinner"></div>正在读取钩子灵感库…</div></div>
  </section>

  <!-- 对标账号 -->
  <section class="view" id="v-bench">
    <div id="benchBody"><div class="loading"><div class="spinner"></div>正在读取对标账号库…</div></div>
  </section>

  <!-- AI 工作台 -->
  <section class="view" id="v-ai">
    <div class="studio">
      <div class="panel">
        <h3>选择工具</h3>
        <p class="hint">每个工具都内置 MAE 品牌语境</p>
        <button class="tool on" data-tool="hook">
          <span class="ico">✦</span>
          <span><span class="tt">钩子生成</span><br><span class="td">前 3 秒抓住她</span></span>
        </button>
        <button class="tool" data-tool="script">
          <span class="ico">✎</span>
          <span><span class="tt">脚本搭建</span><br><span class="td">从钩子到落点</span></span>
        </button>
        <button class="tool" data-tool="series">
          <span class="ico">❋</span>
          <span><span class="tt">系列扩展</span><br><span class="td">一个想法变一季</span></span>
        </button>
      </div>
      <div class="panel">
        <h3 id="toolTitle">钩子生成</h3>
        <p class="hint" id="toolHint">输入主题或场景，生成 5 个高共鸣钩子。</p>
        <label class="fld">你的输入</label>
        <textarea id="aiInput" placeholder="例如：一位妈妈重新开始学画画的故事…"></textarea>
        <button class="run" id="runBtn" onclick="runAI()">
          <span>生成</span><span>✦</span>
        </button>
        <div class="out" id="aiOut"></div>
      </div>
    </div>
  </section>
</main>

<footer class="wrap">
  MAE Global · <em>帮助更多女性看见自己的价值</em> · 内部创意工具
</footer>

<script>
// ---------- tabs ----------
const tabBtns=document.querySelectorAll('nav.tabs button');
tabBtns.forEach(b=>b.onclick=()=>{
  tabBtns.forEach(x=>x.classList.remove('on'));b.classList.add('on');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('v-'+b.dataset.v).classList.add('on');
});

// ---------- safe fetch ----------
async function getJSON(url){
  try{
    const r=await fetch(url);
    const d=await r.json();
    return Array.isArray(d)?d:(Array.isArray(d.results)?d.results:[]);
  }catch(e){return [];}
}

// ---------- connection dot ----------
function setConn(ok){
  const dot=document.getElementById('conn'),txt=document.getElementById('connTxt');
  if(ok){dot.classList.add('live');txt.textContent='数据已连接';}
  else{txt.textContent='等待数据';}
}

// ---------- render helpers ----------
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function emptyState(msg){
  return '<div class="empty"><h3>还没有内容 ✦</h3><p>'+msg+'</p></div>';
}

// ---------- 灵感库 ----------
async function loadInsp(){
  const data=await getJSON('/api/inspirations');
  const body=document.getElementById('inspBody');
  const stats=document.getElementById('inspStats');
  if(data.length){setConn(true);}
  const total=data.length;
  const fmt={};data.forEach(d=>{const f=d.type||d.format||'其他';fmt[f]=(fmt[f]||0)+1;});
  const topFmt=Object.keys(fmt).sort((a,b)=>fmt[b]-fmt[a])[0]||'—';
  stats.innerHTML=[
    ['灵感总数',total],
    ['内容格式',Object.keys(fmt).length],
    ['热门格式',topFmt],
    ['本周新增',data.filter(d=>d.recent).length||'—']
  ].map(s=>'<div class="stat"><div class="n">'+s[1]+'</div><div class="l">'+s[0]+'</div></div>').join('');
  if(!total){body.innerHTML=emptyState('保存一条灵感到 Notion，它会出现在这里。');return;}
  body.innerHTML='<div class="grid">'+data.map(d=>{
    const title=esc(d.title||d.name||'未命名灵感');
    const desc=esc(d.desc||d.description||d.note||'');
    const tag=esc(d.type||d.format||'灵感');
    const url=d.url||d.link||'';
    return '<div class="card"><span class="tag">'+tag+'</span>'+
      '<h3>'+title+'</h3>'+(desc?'<p>'+desc+'</p>':'')+
      '<div class="meta">'+(d.account?'<span>'+esc(d.account)+'</span>':'')+
      (url?'<a class="open" href="'+esc(url)+'" target="_blank">查看 →</a>':'')+
      '</div></div>';
  }).join('')+'</div>';
}

// ---------- 钩子库 ----------
async function loadHooks(){
  const data=await getJSON('/api/hooks');
  const body=document.getElementById('hookBody');
  if(data.length)setConn(true);
  if(!data.length){body.innerHTML=emptyState('钩子灵感库为空，或 Notion 尚未连接。');return;}
  body.innerHTML='<div class="grid">'+data.map(d=>{
    const q=esc(d.hook||d.title||d.name||d.text||'');
    const type=esc(d.type||d.category||'钩子');
    return '<div class="card hook"><span class="tag">'+type+'</span>'+
      '<div class="quote">"'+q+'"</div>'+
      (d.note?'<p>'+esc(d.note)+'</p>':'')+'</div>';
  }).join('')+'</div>';
}

// ---------- 对标账号 ----------
async function loadBench(){
  const data=await getJSON('/api/benchmarks');
  const body=document.getElementById('benchBody');
  if(data.length)setConn(true);
  if(!data.length){body.innerHTML=emptyState('对标账号库为空，或 Notion 尚未连接。');return;}
  body.innerHTML='<div class="grid">'+data.map(d=>{
    const name=esc(d.name||d.account||d.title||'账号');
    const initial=(name.replace('@','')[0]||'?').toUpperCase();
    const lang=esc(d.lang||d.language||'');
    const note=esc(d.note||d.desc||d.description||d.style||'');
    return '<div class="card"><div class="bench">'+
      '<div class="avatar">'+initial+'</div>'+
      '<div style="flex:1"><h3 style="margin-bottom:4px">'+name+'</h3>'+
      (lang?'<span class="tag" style="margin:0">'+lang+'</span>':'')+
      (note?'<p style="margin-top:10px">'+note+'</p>':'')+
      '</div></div></div>';
  }).join('')+'</div>';
}

// ---------- AI 工作台 ----------
const toolMeta={
  hook:{title:'钩子生成',hint:'输入主题或场景，生成 5 个高共鸣钩子。',ph:'例如：一位妈妈重新开始学画画的故事…'},
  script:{title:'脚本搭建',hint:'输入钩子或核心想法，生成完整短视频脚本。',ph:'例如：钩子 = "35 岁，我才第一次为自己活"…'},
  series:{title:'系列扩展',hint:'输入一个成功选题，扩展成一整季内容。',ph:'例如："她的第一次" 系列…'}
};
let curTool='hook';
document.querySelectorAll('.tool').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tool').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');curTool=t.dataset.tool;
  const m=toolMeta[curTool];
  document.getElementById('toolTitle').textContent=m.title;
  document.getElementById('toolHint').textContent=m.hint;
  document.getElementById('aiInput').placeholder=m.ph;
  document.getElementById('aiOut').textContent='';
});

async function runAI(){
  const input=document.getElementById('aiInput').value.trim();
  const out=document.getElementById('aiOut');
  const btn=document.getElementById('runBtn');
  if(!input){out.textContent='请先输入内容 ✦';return;}
  btn.disabled=true;out.textContent='思考中…';
  try{
    const r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tool:curTool,input})});
    const d=await r.json();
    out.textContent=d.result||d.error||'没有返回结果，请稍后再试。';
  }catch(e){out.textContent='生成失败：'+e.message;}
  btn.disabled=false;
}

// ---------- boot ----------
loadInsp();loadHooks();loadBench();
</script>
</body>
</html>
