<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MAE Content Studio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafaf8;color:#1a1a1a}
.app{max-width:800px;margin:0 auto;padding:12px}
.header{padding:12px 0;border-bottom:1px solid #e5e5e0;margin-bottom:12px}
.header h1{font-size:18px;font-weight:500}
.header p{font-size:12px;color:#888}
.nav{display:flex;gap:2px;overflow-x:auto;border-bottom:1px solid #e5e5e0;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.nav-btn{padding:10px 14px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:4px}
.nav-btn.on{color:#185FA5;border-bottom-color:#185FA5}
.section{display:none}.section.on{display:block}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filters select{padding:6px 10px;border:1px solid #e5e5e0;border-radius:6px;font-size:12px;background:#fff}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:14px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:500;margin-bottom:6px}
.card-meta{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;display:inline-block}
.card-text{font-size:12px;color:#666;line-height:1.5}
.card-link{font-size:11px;color:#185FA5;text-decoration:none;word-break:break-all}
.hook-item{border-left:3px solid;padding:6px 0 6px 10px;margin-bottom:10px;border-radius:0}
.hook-type{font-size:10px;padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:3px}
.hook-text{font-size:13px;line-height:1.5}
.hook-note{font-size:11px;color:#888;margin-top:2px}
.bench{display:flex;gap:10px;align-items:flex-start}
.bench-icon{width:36px;height:36px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#185FA5;font-size:14px;font-weight:500}
.bench-info{flex:1}
.bench-name{font-size:14px;font-weight:500}
.bench-reason{font-size:12px;color:#666;margin-top:2px;line-height:1.4}
.bench-tags{margin-top:4px}
input,select,textarea{padding:8px 10px;border:1px solid #e5e5e0;border-radius:8px;font-size:13px;background:#fff;width:100%}
select{width:auto}
.row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.btn{padding:8px 16px;border:1.5px solid #185FA5;background:#E6F1FB;color:#185FA5;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500}
.btn:disabled{opacity:.4}
.ai-out{margin-top:10px}
.ai-card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:14px;margin-top:8px}
.ep{border-bottom:1px solid #f0f0ec;padding:8px 0}
.ep:last-child{border:none}
.ep-num{font-size:10px;color:#185FA5;font-weight:600}
.ep-title{font-size:13px;font-weight:500;margin:1px 0}
.ep-detail{font-size:11px;color:#666;line-height:1.4}
.time-row{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0ec}
.time-label{font-size:11px;color:#185FA5;min-width:38px;font-weight:600}
.time-text{font-size:12px;line-height:1.4}
.time-sub{font-size:11px;color:#888}
.loading{font-size:13px;color:#888;padding:16px 0}
.error{color:#A32D2D;font-size:13px}
.empty{text-align:center;padding:40px 0;color:#888;font-size:13px}
.count{font-size:11px;color:#888;margin-bottom:8px}
.caption-box{background:#fafaf8;border-radius:6px;padding:10px;margin-top:8px}
.caption-text{font-size:12px;line-height:1.5;white-space:pre-wrap}
@media(max-width:600px){.app{padding:8px}.card{padding:10px}.nav-btn{padding:8px 10px;font-size:12px}}
</style>
</head>
<body>
<div class="app">
<div class="header">
<h1><i class="ti ti-sparkles" style="font-size:18px;vertical-align:-2px;margin-right:4px"></i>MAE content studio</h1>
<p>Inspiration + AI tools for PD / CCS / CVP</p>
</div>
<div class="nav">
<button class="nav-btn on" onclick="showSec('insp',this)"><i class="ti ti-bulb" style="font-size:15px"></i>Inspiration</button>
<button class="nav-btn" onclick="showSec('hooks',this)"><i class="ti ti-quote" style="font-size:15px"></i>Hooks</button>
<button class="nav-btn" onclick="showSec('bench',this)"><i class="ti ti-users" style="font-size:15px"></i>Benchmarks</button>
<button class="nav-btn" onclick="showSec('ai-hook',this)"><i class="ti ti-sparkles" style="font-size:15px"></i>AI hook</button>
<button class="nav-btn" onclick="showSec('ai-script',this)"><i class="ti ti-file-text" style="font-size:15px"></i>AI script</button>
<button class="nav-btn" onclick="showSec('ai-series',this)"><i class="ti ti-layers-linked" style="font-size:15px"></i>AI series</button>
</div>

<div id="insp" class="section on">
<div class="filters">
<select id="f-acct" onchange="filterInsp()"><option value="">All accounts</option><option>CEO IP</option><option>品牌流量</option></select>
<select id="f-judge" onchange="filterInsp()"><option value="">All types</option><option>系列种子</option><option>单条-热点</option><option>单条-强事件</option></select>
<select id="f-source" onchange="filterInsp()"><option value="">All sources</option><option>团队收藏</option><option>AI发现</option><option>市场热点</option></select>
<select id="f-identity" onchange="filterInsp()"><option value="">All identities</option><option>老板/创业者</option><option>职场女性</option><option>妈妈</option><option>女儿</option><option>老婆</option><option>家庭主妇</option><option>转型中的女性</option></select>
</div>
<div id="insp-count" class="count"></div>
<div id="insp-list"><p class="loading"><i class="ti ti-loader-2" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Loading inspirations...</p></div>
</div>

<div id="hooks" class="section">
<div class="filters">
<select id="fh-type" onchange="filterHooks()"><option value="">All types</option><option>悬念型</option><option>反差型</option><option>数字型</option><option>痛点型</option><option>金句型</option><option>动作型</option><option>争议型</option></select>
<select id="fh-acct" onchange="filterHooks()"><option value="">All accounts</option><option>CEO IP</option><option>品牌流量</option><option>通用</option></select>
</div>
<div id="hooks-list"><p class="loading"><i class="ti ti-loader-2" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Loading hooks...</p></div>
</div>

<div id="bench" class="section">
<div id="bench-list"><p class="loading"><i class="ti ti-loader-2" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Loading benchmarks...</p></div>
</div>

<div id="ai-hook" class="section">
<div class="row">
<select id="ah-acct" style="max-width:160px"><option value="CEO IP">CEO IP</option><option value="Brand">Brand</option></select>
<select id="ah-id" style="max-width:160px"><option value="职场女性">Workplace women</option><option value="老板/创业者">Boss / founder</option><option value="妈妈">Mother</option><option value="女儿">Daughter</option><option value="老婆">Wife</option><option value="家庭主妇">Homemaker</option></select>
</div>
<input id="ah-topic" placeholder="Topic: imposter syndrome, first hire, work-life balance..." style="margin-bottom:8px">
<button class="btn" onclick="aiHook()" id="ah-btn"><i class="ti ti-sparkles" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Generate 5 hooks</button>
<div id="ah-out" class="ai-out"></div>
</div>

<div id="ai-script" class="section">
<input id="as-hook" placeholder="Your hook (first 3 seconds)" style="margin-bottom:8px">
<input id="as-km" placeholder="Key Message (one sentence to remember)" style="margin-bottom:8px">
<div class="row">
<select id="as-acct" style="max-width:160px"><option value="CEO IP">CEO IP</option><option value="Brand">Brand</option></select>
<select id="as-dur" style="max-width:100px"><option value="15">15s</option><option value="30">30s</option><option value="60">60s</option></select>
</div>
<button class="btn" onclick="aiScript()" id="as-btn"><i class="ti ti-file-text" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Build script</button>
<div id="as-out" class="ai-out"></div>
</div>

<div id="ai-series" class="section">
<input id="ax-name" placeholder="Series seed: Kate's failures, office POV, mom moments..." style="margin-bottom:8px">
<div class="row">
<select id="ax-acct" style="max-width:160px"><option value="CEO IP">CEO IP</option><option value="Brand">Brand</option></select>
<select id="ax-eps" style="max-width:100px"><option value="8">8 eps</option><option value="5">5 eps</option><option value="10">10 eps</option></select>
</div>
<button class="btn" onclick="aiSeries()" id="ax-btn"><i class="ti ti-layers-linked" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Expand series</button>
<div id="ax-out" class="ai-out"></div>
</div>
</div>

<script>
var allInsp=[],allHooks=[];
var TC={'悬念型':['#EEEDFE','#3C3489','#AFA9EC'],'反差型':['#FAECE7','#712B13','#F0997B'],'数字型':['#E6F1FB','#0C447C','#85B7EB'],'痛点型':['#FCEBEB','#791F1F','#F09595'],'金句型':['#FBEAF0','#72243E','#ED93B1'],'提问型':['#EAF3DE','#27500A','#97C459'],'动作型':['#FAEEDA','#633806','#EF9F27'],'争议型':['#F1EFE8','#444441','#B4B2A9']};
var JC={'系列种子':['#EEEDFE','#3C3489'],'单条-热点':['#FAECE7','#712B13'],'单条-强事件':['#E6F1FB','#0C447C'],'单条-测试':['#F1EFE8','#444441']};
var SC={'团队收藏':['#E6F1FB','#0C447C'],'AI发现':['#EEEDFE','#3C3489'],'市场热点':['#FCEBEB','#791F1F']};
var CC={'绿灯-可直接发':['#EAF3DE','#27500A'],'黄灯-需修改':['#FAEEDA','#633806'],'红灯-不可发':['#FCEBEB','#791F1F']};

function showSec(id,el){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));document.querySelectorAll('.section').forEach(s=>s.classList.remove('on'));el.classList.add('on');document.getElementById(id).classList.add('on')}
function mkTag(text,colors){if(!text||!colors)return'';return'<span class="tag" style="background:'+colors[0]+';color:'+colors[1]+'">'+text+'</span>'}

function renderInsp(items){
if(!items.length)return'<p class="empty">No inspirations found</p>';
return items.map(i=>{
var tags=mkTag(i.source,SC[i.source])+mkTag(i.account,i.account==='CEO IP'?['#EEEDFE','#3C3489']:['#E6F1FB','#0C447C'])+mkTag(i.judgment,JC[i.judgment])+mkTag(i.event,TC[i.event]||['#F1EFE8','#444441'])+mkTag(i.compliance,CC[i.compliance]);
return'<div class="card"><div class="card-meta">'+tags+'</div><p class="card-title">'+i.title+'</p>'+(i.concept?'<p class="card-text" style="margin-bottom:4px">'+i.concept+'</p>':'')+(i.identity?'<p class="card-text" style="color:#888">Target: '+i.identity+'</p>':'')+(i.link?'<a class="card-link" href="'+i.link+'" target="_blank"><i class="ti ti-external-link" style="font-size:11px;vertical-align:-1px;margin-right:2px"></i>'+i.link.substring(0,50)+'...</a>':'')+'</div>'}).join('')}

function filterInsp(){
var a=document.getElementById('f-acct').value,j=document.getElementById('f-judge').value,s=document.getElementById('f-source').value,d=document.getElementById('f-identity').value;
var f=allInsp.filter(i=>(!a||i.account===a)&&(!j||i.judgment===j)&&(!s||i.source===s)&&(!d||i.identity===d));
document.getElementById('insp-count').textContent=f.length+' / '+allInsp.length+' inspirations';
document.getElementById('insp-list').innerHTML=renderInsp(f)}

function filterHooks(){
var t=document.getElementById('fh-type').value,a=document.getElementById('fh-acct').value;
var f=allHooks.filter(h=>(!t||h.type===t)&&(!a||h.account===a));
document.getElementById('hooks-list').innerHTML=renderHooks(f)}

function renderHooks(items){
return items.map(h=>{var c=TC[h.type]||['#F1EFE8','#444441','#B4B2A9'];
return'<div class="hook-item" style="border-color:'+c[2]+'"><span class="hook-type" style="background:'+c[0]+';color:'+c[1]+'">'+h.type+'</span><p class="hook-text">'+h.content+'</p><p class="hook-note">'+h.example+'</p>'+(h.identity?'<p class="hook-note">Identity: '+(Array.isArray(h.identity)?h.identity.join(', '):h.identity)+'</p>':'')+'</div>'}).join('')}

function renderBench(items){
return items.map(b=>{var init=b.name.replace('@','').substring(0,2).toUpperCase();
return'<div class="card"><div class="bench"><div class="bench-icon">'+init+'</div><div class="bench-info"><p class="bench-name">'+b.name+'</p><p class="bench-reason">'+b.reason+'</p><div class="bench-tags" style="margin-top:4px">'+mkTag(b.platform,['#EEEDFE','#3C3489'])+(Array.isArray(b.language)?b.language.map(l=>mkTag(l,['#E1F5EE','#085041'])).join(''):'')+(Array.isArray(b.types)?b.types.map(t=>mkTag(t,['#E6F1FB','#0C447C'])).join(''):'')+'</div>'+(b.link?'<a class="card-link" href="'+b.link+'" target="_blank" style="display:inline-block;margin-top:4px"><i class="ti ti-external-link" style="font-size:11px;vertical-align:-1px;margin-right:2px"></i>View profile</a>':'')+'</div></div></div>'}).join('')}

async function loadData(){
try{var[i,h,b]=await Promise.all([fetch('/api/inspirations').then(r=>r.json()),fetch('/api/hooks').then(r=>r.json()),fetch('/api/benchmarks').then(r=>r.json())]);
allInsp=i;allHooks=h;filterInsp();filterHooks();
document.getElementById('bench-list').innerHTML=renderBench(b);
}catch(e){document.getElementById('insp-list').innerHTML='<p class="error">Failed to load: '+e+'</p>'}}

async function aiCall(mode,params){var r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode,params})});return(await r.json()).text}

async function aiHook(){
var topic=document.getElementById('ah-topic').value;if(!topic)return;
document.getElementById('ah-btn').disabled=true;
document.getElementById('ah-out').innerHTML='<p class="loading">Generating hooks...</p>';
try{var raw=await aiCall('hook',{topic,account:document.getElementById('ah-acct').value,identity:document.getElementById('ah-id').value});
var m=raw.match(/\[[\s\S]*\]/);var hooks=JSON.parse(m[0]);
document.getElementById('ah-out').innerHTML='<div class="ai-card">'+hooks.map(h=>{var c=TC[h.type]||['#F1EFE8','#444441','#B4B2A9'];return'<div class="hook-item" style="border-color:'+c[2]+'"><span class="hook-type" style="background:'+c[0]+';color:'+c[1]+'">'+h.type+'</span><p class="hook-text">'+h.hook+'</p><p class="hook-note">Visual: '+h.visual+'</p><p class="hook-note">Why: '+h.why+'</p></div>'}).join('')+'</div>';
}catch(e){document.getElementById('ah-out').innerHTML='<p class="error">Error. Try again.</p>'}
document.getElementById('ah-btn').disabled=false}

async function aiScript(){
var hook=document.getElementById('as-hook').value,km=document.getElementById('as-km').value;if(!hook||!km)return;
document.getElementById('as-btn').disabled=true;
document.getElementById('as-out').innerHTML='<p class="loading">Building script...</p>';
try{var raw=await aiCall('script',{hook,km,account:document.getElementById('as-acct').value,duration:document.getElementById('as-dur').value});
var m=raw.match(/\{[\s\S]*\}/);var s=JSON.parse(m[0]);
var h='<div class="ai-card"><p style="font-size:12px;color:#888;margin-bottom:8px">'+s.target_identity+' — She feels: '+s.she_feels+'</p>';
s.structure.forEach(st=>{h+='<div class="time-row"><span class="time-label">'+st.time+'</span><div><p class="time-text">'+st.action+'</p>'+(st.text?'<p class="time-sub">Text: '+st.text+'</p>':'')+(st.audio?'<p class="time-sub">Audio: '+st.audio+'</p>':'')+'</div></div>'});
h+='<div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap"><div style="flex:1;min-width:150px"><p style="font-size:11px;color:#888">Shooting</p><p style="font-size:12px;color:#666">'+s.shooting+'</p></div><div style="flex:1;min-width:150px"><p style="font-size:11px;color:#888">Editing</p><p style="font-size:12px;color:#666">'+s.editing+'</p></div></div>';
h+='<div class="caption-box"><p style="font-size:11px;color:#888;margin-bottom:4px">Caption</p><p class="caption-text">'+s.caption+'</p></div></div>';
document.getElementById('as-out').innerHTML=h;
}catch(e){document.getElementById('as-out').innerHTML='<p class="error">Error. Try again.</p>'}
document.getElementById('as-btn').disabled=false}

async function aiSeries(){
var name=document.getElementById('ax-name').value;if(!name)return;
document.getElementById('ax-btn').disabled=true;
document.getElementById('ax-out').innerHTML='<p class="loading">Expanding series...</p>';
try{var raw=await aiCall('series',{name,account:document.getElementById('ax-acct').value,episodes:document.getElementById('ax-eps').value});
var m=raw.match(/\{[\s\S]*\}/);var s=JSON.parse(m[0]);
var h='<div class="ai-card"><p style="font-size:16px;font-weight:500;margin-bottom:2px">'+s.series_name+'</p><p style="font-size:12px;color:#666;margin-bottom:2px">'+s.core_suspense+'</p><p style="font-size:11px;color:#888;margin-bottom:10px">'+s.target_identity+' · '+s.rhythm+'</p>';
s.episodes.forEach(ep=>{h+='<div class="ep"><p class="ep-num">EP '+ep.ep+'</p><p class="ep-title">'+ep.title+'</p><p class="ep-detail">KM: '+ep.key_message+'</p><p class="ep-detail">Hook: '+ep.hook+'</p><p class="ep-detail">Format: '+ep.format+'</p><p class="ep-detail" style="color:#888">She feels: '+ep.she_feels+'</p></div>'});
h+='</div>';document.getElementById('ax-out').innerHTML=h;
}catch(e){document.getElementById('ax-out').innerHTML='<p class="error">Error. Try again.</p>'}
document.getElementById('ax-btn').disabled=false}

loadData();
</script>
</body>
</html>
